<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatrOps — Scan Me</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  min-height:100vh;width:100%;
  background:#050505;
  display:flex;align-items:center;justify-content:center;
  font-family:'Montserrat',sans-serif;
  overflow:hidden;
}

/* ── AMBIENT BACKGROUND ── */
.ambient{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 110%, rgba(200,16,46,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 15% 20%, rgba(200,16,46,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 35% 35% at 85% 15%, rgba(201,168,76,0.05) 0%, transparent 55%),
    #050505;
  animation: ambientShift 8s ease-in-out infinite alternate;
}
@keyframes ambientShift{
  from{background-position:0% 0%}
  to{filter:brightness(1.08)}
}

/* ── GRID ── */
.grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(200,16,46,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,16,46,0.05) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,black 0%,transparent 80%);
  animation:gridPulse 6s ease-in-out infinite alternate;
}
@keyframes gridPulse{
  from{opacity:0.6}
  to{opacity:1}
}

/* ── CARD ── */
.card{
  position:relative;
  width:340px;
  padding:44px 40px 40px;
  display:flex;flex-direction:column;align-items:center;gap:0;
  z-index:10;
  animation:cardRise 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0;
}
@keyframes cardRise{
  from{opacity:0;transform:translateY(32px)}
  to{opacity:1;transform:translateY(0)}
}

/* satin background */
.card-bg{
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,
      rgba(30,20,20,0.98) 0%,
      rgba(18,12,12,0.99) 30%,
      rgba(24,16,16,0.97) 50%,
      rgba(14,10,10,0.99) 70%,
      rgba(26,18,18,0.98) 100%);
  border:1px solid rgba(255,255,255,0.07);
  overflow:hidden;
}

/* satin sheen sweep */
.card-bg::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(
    105deg,
    transparent 20%,
    rgba(255,255,255,0.028) 35%,
    rgba(255,255,255,0.055) 45%,
    rgba(201,168,76,0.04) 50%,
    rgba(255,255,255,0.028) 55%,
    transparent 70%
  );
  transform:translateX(-100%);
  animation:sheen 4s ease-in-out infinite;
}
@keyframes sheen{
  0%{transform:translateX(-100%)}
  40%,100%{transform:translateX(200%)}
}

/* fabric fold lines */
.card-bg::after{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    92deg,
    transparent,
    transparent 48px,
    rgba(255,255,255,0.012) 49px,
    transparent 50px
  );
  mix-blend-mode:overlay;
}

/* top gradient line */
.top-line{
  position:absolute;top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(to right,transparent,#C8102E,#C9A84C,transparent);
  animation:linePulse 3s ease-in-out infinite alternate;
}
@keyframes linePulse{
  from{opacity:0.7}
  to{opacity:1}
}

/* corner accents */
.corner{
  position:absolute;
  width:16px;height:16px;
  border-color:rgba(201,168,76,0.35);
  border-style:solid;
}
.corner.tl{top:12px;left:12px;border-width:1px 0 0 1px}
.corner.tr{top:12px;right:12px;border-width:1px 1px 0 0}
.corner.bl{bottom:12px;left:12px;border-width:0 0 1px 1px}
.corner.br{bottom:12px;right:12px;border-width:0 1px 1px 0}

/* ── LOGO ── */
.logo-wrap{
  position:relative;z-index:2;
  text-align:center;
  margin-bottom:28px;
  animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;opacity:0;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:7px;
  color:#FAFAFA;display:block;line-height:1;
}
.logo span{color:#C8102E}
.logo-sub{
  font-size:8px;letter-spacing:5px;text-transform:uppercase;
  color:#C9A84C;margin-top:5px;display:block;
}

/* ── BADGE ── */
.badge{
  position:relative;z-index:2;
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 14px;
  border:1px solid rgba(201,168,76,0.22);
  font-size:7px;letter-spacing:4px;text-transform:uppercase;
  color:#C9A84C;
  margin-bottom:24px;
  animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;opacity:0;
}
.badge-dot{
  width:5px;height:5px;background:#C9A84C;border-radius:50%;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.3;transform:scale(0.55)}
}

/* ── QR FRAME ── */
.qr-frame{
  position:relative;z-index:2;
  width:220px;height:220px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;
  animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;opacity:0;
}

/* red glow behind QR */
.qr-frame::before{
  content:'';
  position:absolute;inset:-20px;
  background:radial-gradient(circle,rgba(200,16,46,0.18) 0%,transparent 70%);
  animation:glowPulse 3s ease-in-out infinite alternate;
  border-radius:50%;
}
@keyframes glowPulse{
  from{opacity:0.6;transform:scale(0.95)}
  to{opacity:1;transform:scale(1.05)}
}

.qr-border{
  position:absolute;inset:0;
  border:1px solid rgba(200,16,46,0.25);
  animation:borderPulse 3s ease-in-out infinite alternate;
}
@keyframes borderPulse{
  from{border-color:rgba(200,16,46,0.15)}
  to{border-color:rgba(200,16,46,0.45)}
}

/* rotating dashes */
.qr-ring{
  position:absolute;inset:-8px;
  border:1px dashed rgba(201,168,76,0.18);
  animation:spin 20s linear infinite;
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.qr-inner{
  width:200px;height:200px;
  background:#FAFAFA;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

.qr-inner img{
  width:180px;height:180px;
  image-rendering:pixelated;
}

/* scan line animation */
.scan-line{
  position:absolute;left:0;right:0;
  height:2px;
  background:linear-gradient(to right,transparent,rgba(200,16,46,0.7),transparent);
  animation:scanMove 2.5s ease-in-out infinite;
  top:0;
}
@keyframes scanMove{
  0%{top:0;opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{top:100%;opacity:0}
}

/* ── HEADLINE ── */
.headline{
  position:relative;z-index:2;
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:300;
  line-height:1.15;text-align:center;
  color:#FAFAFA;
  margin-bottom:10px;
  animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.65s forwards;opacity:0;
}
.headline em{font-style:italic;color:#E8C97A}

/* ── URL ── */
.url-wrap{
  position:relative;z-index:2;
  display:flex;align-items:center;gap:10px;
  margin-bottom:24px;
  animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.75s forwards;opacity:0;
}
.url-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(200,16,46,0.3))}
.url-line.r{background:linear-gradient(to left,transparent,rgba(200,16,46,0.3))}
.url-text{
  font-family:'Montserrat',sans-serif;
  font-size:9px;font-weight:200;
  letter-spacing:5px;text-transform:uppercase;
  color:rgba(250,250,250,0.45);
}

/* ── SUB ── */
.sub{
  position:relative;z-index:2;
  font-size:9px;font-weight:300;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(176,168,154,0.6);
  text-align:center;
  animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.85s forwards;opacity:0;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── PARTICLES ── */
.particle{
  position:fixed;
  width:1px;height:1px;
  background:rgba(201,168,76,0.6);
  border-radius:50%;
  animation:float linear infinite;
  pointer-events:none;
}
@keyframes float{
  from{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:1}
  90%{opacity:0.5}
  to{transform:translateY(-10vh) translateX(var(--drift));opacity:0}
}
</style>
</head>
